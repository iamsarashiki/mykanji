<!DOCTYPE html>
<html>
<head>
    <title>Daftar Kanji</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <?php include 'includes/nav.php'; ?>
    <div class="container">
        <h1>Kanji N5</h1>
        <div id="kanji-list"></div>
        <h1>Kanji N4</h1>
        <div id="kanji-list-n4"></div>
    </div>
    <script>
        async function loadKanji(level, elementId) {
            const res = await fetch(`api/get_kanji.php?level=${level}`);
            const data = await res.json();
            let html = '<ul>';
            data.forEach(item => {
                html += `<li>
                    <strong>${item.kanji}</strong> (${item.baca})<br>
                    <em>${item.contoh}</em> — ${item.arti}
                    <input type="checkbox" class="hafal" data-kanji="${item.kanji}"> Hafal
                </li>`;
            });
            html += '</ul>';
            document.getElementById(elementId).innerHTML = html;
        }
        loadKanji('n5', 'kanji-list');
        loadKanji('n4', 'kanji-list-n4');
    </script>
</body>
</html>
